<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Fruit Bowl Co</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9966,#ff5e62);
color:white;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
margin:0;
padding:20px;
}

.container{
max-width:600px;
}

h1{
font-size:48px;
margin-bottom:10px;
}

p{
font-size:18px;
opacity:0.95;
margin:8px 0;
}

.loader{
margin-top:25px;
border:6px solid rgba(255,255,255,0.3);
border-top:6px solid white;
border-radius:50%;
width:50px;
height:50px;
animation:spin 1s linear infinite;
margin-left:auto;
margin-right:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.contact-btn{
display:inline-block;
margin-top:30px;
padding:12px 25px;
background:white;
color:#ff5e62;
text-decoration:none;
font-weight:bold;
border-radius:30px;
transition:0.3s;
}

.contact-btn:hover{
background:#ffe6e6;
transform:scale(1.05);
}

.footer{
margin-top:35px;
font-size:14px;
opacity:0.85;
}

</style>
</head>

<body>

<div class="container">

<h1>🍓 The Fruit Bowl Co</h1>

<p>Fresh things are coming soon.</p>

<p>Our website is currently under construction.</p>

<div class="loader"></div>

<a class="contact-btn"
href="mailto:admin@thefruitbowlco.ca?subject=Fruit Bowl Inquiry&body=Hello The Fruit Bowl Co,">
Contact Us
</a>

<div class="footer">
Launching Soon 🚀
</div>

</div>

</body>
</html>
