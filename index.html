<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Fruit Bowl Co</title>

<style>

/* Reset and body */
body{
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg,#ff9966,#ff5e62);
    color:white;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Container */
.container{
    max-width:650px;
    text-align:center;
    background: rgba(255,255,255,0.05);
    padding:40px 30px;
    border-radius:20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* Title */
h1{
    font-size:50px;
    margin-bottom:15px;
}

/* Fruit icons row */
.fruits{
    font-size:32px;
    margin-bottom:20px;
}

/* Paragraphs */
p{
    font-size:18px;
    margin:10px 0;
    line-height:1.5;
}

/* Contact box */
.contact{
    margin-top:25px;
    font-size:16px;
    background: rgba(255,255,255,0.2);
    padding:15px 20px;
    border-radius:15px;
}

.contact a{
    color:white;
    font-weight:bold;
    text-decoration:underline;
}

/* Footer */
.footer{
    margin-top:25px;
    font-size:14px;
    opacity:0.85;
}

/* Subtle floating fruit animation */
@keyframes float{
    0% { transform: translateY(0px);}
    50% { transform: translateY(-10px);}
    100% { transform: translateY(0px);}
}
.fruits span{
    display:inline-block;
    animation: float 3s ease-in-out infinite;
    margin: 0 5px;
}

</style>
</head>

<body>

<div class="container">

<h1>🍓 The Fruit Bowl Co 🍊</h1>

<div class="fruits">
<span>🍌</span>
<span>🍉</span>
<span>🍍</span>
<span>🥭</span>
<span>🍎</span>
</div>

<p>Fresh delights are coming soon! 🍓</p>
<p>We’re carefully crafting the best fruits and goodies just for you.</p>

<div class="contact">
Want more info or to get in touch? <br>
<a href="mailto:admin@thefruitbowlco.ca">admin@thefruitbowlco.ca</a>
</div>

<div class="footer">
Stay tuned! Launching Soon 🚀
</div>

</div>

</body>
</html>
