<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Fruit Bowl Co</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9966,#ff5e62);
color:white;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
margin:0;
}

h1{
font-size:48px;
margin-bottom:10px;
}

p{
font-size:20px;
opacity:0.9;
}

.loader{
margin-top:30px;
border:6px solid rgba(255,255,255,0.3);
border-top:6px solid white;
border-radius:50%;
width:50px;
height:50px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<h1>🍓 The Fruit Bowl Co</h1>

<p>Fresh things are coming soon.</p>

<p>Our website is currently under construction.</p>

<div class="loader"></div>

<p style="margin-top:30px;font-size:14px;">
Launching Soon 🚀
</p>

</body>
</html>
